<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SummerFit">
<title>SummerFit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#090910;--surface:#101018;--surface2:#161622;--border:#1f1f30;--border2:#2a2a3f;
  --accent:#E8FF47;--accent-dim:rgba(232,255,71,0.12);
  --danger:#FF4747;--danger-dim:rgba(255,71,71,0.12);
  --warn:#FF9800;--warn-dim:rgba(255,152,0,0.12);
  --muted:#555570;--muted2:#3a3a55;
  --text:#e8e8f0;--text2:#9090aa;--text3:#606078;
  --green:#4CAF50;--green-dim:rgba(76,175,80,0.12);
  --blue:#4FC3F7;--blue-dim:rgba(79,195,247,0.1);
  --radius:10px;--radius-sm:6px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%;padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);}
.app{min-height:100vh;max-width:600px;margin:0 auto;padding-bottom:calc(env(safe-area-inset-bottom) + 100px);}
/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;padding:16px 16px 12px;padding-top:calc(env(safe-area-inset-top) + 16px);border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.nav-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;letter-spacing:-0.5px;color:var(--accent);}
.nav-logo span{color:var(--text3);font-weight:400;}
.nav-tabs{display:flex;gap:4px;}
.tab-btn{background:none;border:none;color:var(--text3);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:6px 10px;border-radius:var(--radius-sm);cursor:pointer;}
.tab-btn.active{background:var(--accent-dim);color:var(--accent);}
/* STAGE BANNER */
.stage-banner{margin:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:10px;}
.stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.stage-week{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--text3);}
/* NEXT DAY HERO */
.next-day-hero{margin:12px 16px;background:var(--surface);border:2px solid var(--accent);border-radius:var(--radius);padding:16px;cursor:pointer;user-select:none;}
.ndh-eyebrow{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:4px;}
.ndh-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--text);}
.ndh-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.ndh-btn{margin-top:12px;background:var(--accent);color:#090910;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;border:none;border-radius:var(--radius-sm);padding:11px 20px;cursor:pointer;display:inline-block;pointer-events:none;}
.ndh-rest{margin:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;}
/* DASH GRID */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px;}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.dash-label{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:6px;}
.dash-value{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--text);line-height:1;}
.dash-value.accent{color:var(--accent);}
.dash-sub{font-size:12px;color:var(--text3);margin-top:4px;}
/* DAY LIST */
.day-list{padding:0 16px;display:flex;flex-direction:column;gap:8px;}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;user-select:none;}
.day-card.done-card{border-color:var(--green);opacity:0.7;}
.day-num{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);}
.day-name{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--text);}
.day-sub{font-size:12px;color:var(--text3);}
.day-ex-count{margin-left:auto;font-size:11px;color:var(--text3);white-space:nowrap;}
/* WORKOUT HEADER */
.workout-header{padding:16px 16px 10px;}
.back-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;margin-bottom:10px;padding:6px 0;font-family:'Inter',sans-serif;display:block;}
.workout-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;}
.workout-subtitle{color:var(--text3);font-size:13px;margin-top:2px;}
.workout-progress{height:3px;background:var(--border);border-radius:2px;margin:12px 16px 0;}
.workout-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s;}
.prog-label{padding:6px 16px;font-size:11px;color:var(--text3);}
/* EXERCISE CARDS */
.ex-card{margin:10px 16px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.ex-header{padding:16px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;min-height:64px;-webkit-tap-highlight-color:transparent;}
.ex-header>*{pointer-events:none;}.ex-header .ex-body{pointer-events:auto;}
.ex-num{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:var(--text3);min-width:20px;}
.ex-title{flex:1;}
.ex-name{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--text);}
.ex-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.ex-status{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.badge-done{font-size:10px;font-weight:700;background:var(--green-dim);color:var(--green);border-radius:4px;padding:3px 8px;}
.badge-prog{font-size:10px;font-weight:700;background:var(--accent-dim);color:var(--accent);border-radius:4px;padding:3px 8px;}
.chevron{color:var(--text3);font-size:11px;transition:transform 0.2s;margin-left:6px;flex-shrink:0;}
.chevron.open{transform:rotate(180deg);}
.ex-body{border-top:1px solid var(--border);}.ex-body input,.ex-body button,.ex-body a,.ex-body textarea{pointer-events:auto !important;}
/* SET ROWS */
.set-header{display:grid;grid-template-columns:26px 1fr 1fr 70px 36px;gap:6px;padding:10px 14px 4px;}
.shc{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);text-align:center;}
.shc:first-child{text-align:left;}
.set-row{display:grid;grid-template-columns:26px 1fr 1fr 70px 36px;gap:6px;padding:5px 14px;align-items:center;}
.set-row.s-done{background:var(--green-dim);}
.set-row.s-pain{background:var(--danger-dim);}
.set-num{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:var(--text3);}
.set-input{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 4px;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--text);width:100%;text-align:center;outline:none;-webkit-appearance:none;}
.set-input:focus{border-color:var(--accent);background:#0d0d18;}
.set-input::placeholder{color:var(--muted);font-weight:400;font-size:11px;}
.rir-wrap{display:flex;gap:3px;}
.rir-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:7px 2px;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;flex:1;text-align:center;user-select:none;-webkit-tap-highlight-color:transparent;}
.rir-btn.sel{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.pain-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:4px;font-size:15px;cursor:pointer;padding:5px;width:36px;text-align:center;user-select:none;-webkit-tap-highlight-color:transparent;opacity:0.5;}
.pain-btn.on{opacity:1;border-color:var(--danger);background:var(--danger-dim);}
/* EX ACTIONS */
.ex-actions{padding:10px 14px;display:flex;gap:8px;}
.form-toggle{display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 10px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text3);flex:1;user-select:none;-webkit-tap-highlight-color:transparent;}
.form-toggle.good{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.form-toggle.bad{background:var(--danger-dim);border-color:var(--danger);color:var(--danger);}
/* BANNERS */
.safety-warn{margin:8px 14px;background:var(--warn-dim);border:1px solid var(--warn);border-radius:var(--radius-sm);padding:9px 11px;font-size:11px;color:var(--warn);line-height:1.5;}
.prog-rec{margin:8px 14px;background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:9px 11px;font-size:11px;color:var(--accent);font-weight:600;}
.pain-warn{margin:8px 14px;background:var(--danger-dim);border:1px solid var(--danger);border-radius:var(--radius-sm);padding:9px 11px;font-size:11px;color:var(--danger);line-height:1.5;}
/* EX INFO */
.ex-info{padding:4px 14px 14px;}
.info-section{margin-bottom:10px;}
.info-label{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:5px;}
.cue-item{font-size:12px;color:var(--text2);padding-left:13px;position:relative;margin-bottom:3px;line-height:1.5;}
.cue-item::before{content:"→";position:absolute;left:0;color:var(--accent);font-size:10px;top:3px;}
.mistake-item{font-size:12px;color:var(--text2);padding-left:13px;position:relative;margin-bottom:3px;line-height:1.5;}
.mistake-item::before{content:"✕";position:absolute;left:0;color:var(--danger);font-size:10px;top:3px;}
.video-link{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;color:var(--text2);text-decoration:none;margin-top:2px;}
/* ASSIST NOTE */
.assist-note{margin:8px 14px;background:var(--blue-dim);border:1px solid var(--blue);border-radius:var(--radius-sm);padding:9px 11px;font-size:11px;color:var(--blue);line-height:1.5;}
/* CORE */
.core-options{padding:8px 14px 12px;}
.core-cat-label{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:5px;margin-top:10px;}
.core-chips{display:flex;flex-wrap:wrap;gap:6px;}
.core-chip{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 13px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.core-chip.sel{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
/* CARDIO */
.cardio-card{margin:10px 16px 0;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;}
.cardio-header{padding:14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.cardio-header>*{pointer-events:none;}
.cardio-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--blue);}
.cardio-desc{font-size:12px;color:var(--text2);margin-top:2px;}
.cardio-logged-badge{font-size:10px;font-weight:600;background:var(--blue-dim);color:var(--blue);border-radius:4px;padding:2px 7px;white-space:nowrap;flex-shrink:0;}
.cardio-body{border-top:1px solid var(--border);padding:12px 14px;}
.cardio-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.cardio-field label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);display:block;margin-bottom:4px;}
.cardio-input{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 6px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--text);width:100%;text-align:center;outline:none;-webkit-appearance:none;}
.cardio-input:focus{border-color:var(--blue);}
.cardio-input::placeholder{color:var(--muted);font-weight:400;font-size:11px;}
.cardio-types{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.ctype-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 13px;font-size:11px;color:var(--text3);cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.ctype-btn.sel{background:var(--blue-dim);border-color:var(--blue);color:var(--blue);}
.cardio-log-btn{width:100%;background:var(--blue-dim);border:1px solid var(--blue);color:var(--blue);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;border-radius:var(--radius-sm);padding:11px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.cardio-entry{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--border);font-size:12px;color:var(--text2);margin-top:6px;}
.del-btn{margin-left:auto;background:none;border:1px solid var(--border2);border-radius:4px;color:var(--text3);cursor:pointer;font-size:11px;padding:3px 7px;-webkit-tap-highlight-color:transparent;}
/* NOTES */
.notes-section{margin:16px 16px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.notes-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;}
.note-field{margin-bottom:10px;}
.note-label{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;display:block;}
.note-input{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 10px;font-size:13px;color:var(--text);width:100%;outline:none;font-family:'Inter',sans-serif;resize:none;-webkit-appearance:none;}
.note-input:focus{border-color:var(--accent);}
.note-input::placeholder{color:var(--muted);}
/* COMPLETE */
.complete-section{margin:16px 16px 0;}
.complete-btn{width:100%;background:var(--accent);color:#090910;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:var(--radius);padding:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.complete-btn.saved{background:var(--green);color:#fff;}
/* MISC */
.section-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:16px 16px 8px;}
.pr-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;display:flex;align-items:center;gap:12px;margin:0 16px 6px;}
.pr-val{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--accent);}
.pr-val.empty{color:var(--text3);}
.history-list{padding:0 16px;display:flex;flex-direction:column;gap:8px;}
.history-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.hdate{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:4px;}
.hname{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--text);}
.chip-row{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;}
.chip{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:3px 8px;font-size:11px;color:var(--text2);}
.chip.blue{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin:0 16px 10px;}
.chart-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;}
.chart-area{height:80px;display:flex;align-items:flex-end;gap:3px;}
.bar-wrap{flex:1;height:100%;display:flex;align-items:flex-end;}
.bar{width:100%;background:var(--accent-dim);border-radius:3px 3px 0 0;border:1px solid rgba(232,255,71,0.3);border-bottom:none;min-height:4px;}
.bar.blue{background:var(--blue-dim);border-color:rgba(79,195,247,0.3);}
.chart-empty{color:var(--text3);font-size:12px;text-align:center;padding:20px;}
.chart-stat{margin-top:6px;font-size:11px;color:var(--text3);}
.settings-section{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.setting-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.setting-name{font-size:13px;font-weight:600;color:var(--text);}
.setting-desc{font-size:11px;color:var(--text3);margin-top:2px;}
.num-ctrl{display:flex;align-items:center;gap:8px;}
.num-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);width:38px;height:38px;font-size:22px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.num-val{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--accent);min-width:32px;text-align:center;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.prog-info{font-size:12px;color:var(--text3);line-height:1.9;margin-top:8px;}
.prog-info b{color:var(--text2);}
.phase-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.phase-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.cstat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px;margin-bottom:10px;}
.cstat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;}
.cstat-label{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--blue);margin-bottom:4px;}
.cstat-val{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--text);}
.cstat-sub{font-size:11px;color:var(--text3);margin-top:2px;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const SK='sf_v4';
let S=(()=>{try{return JSON.parse(localStorage.getItem(SK))||ds();}catch(e){return ds();}})();
function ds(){return{tab:'workout',activeDay:null,week:1,logs:{},cardioLogs:[],sess:{},notes:{},open:{},cores:{},cardioOpen:{},lastDay:null};}
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

// ── PROGRAM ────────────────────────────────────────────────────────────────
const DAYS=["Day 1","Day 2","Day 3","Day 4"];

const P={
"Day 1":{
  label:"Upper A",sub:"Chest & Back",
  cardio:"Incline treadmill walk: 20–30 min · 3.0 mph · 8–12% incline",
  ex:[
    {id:"smith_bench",name:"Smith Machine Bench Press",sets:4,rep:[6,8],type:"smith",sf:"shoulder",
      assist:null,
      cues:["Set bar at lower-chest height","Feet flat, arch slightly","Control descent 2 sec","Press in a slight arc — Smith guides the path"],
      err:["Bouncing off chest","Butt lifting off bench","Elbows flared too wide"],
      vid:"Smith machine bench press form Jeff Nippard"},
    {id:"incline_db",name:"Incline Dumbbell Press",sets:3,rep:[8,12],type:"dumbbell",sf:"shoulder",
      assist:null,
      cues:["30–45° incline","Neutral grip at bottom, slight pronation at top","Control the eccentric 2–3 sec","Full stretch at bottom"],
      err:["Incline too steep (becomes shoulder press)","Dumbbells drifting too wide"],
      vid:"incline dumbbell press hypertrophy Renaissance Periodization"},
    {id:"pullup_assist_a",name:"Assisted Pullups",sets:4,rep:[6,8],type:"assist-machine",sf:null,
      assist:"Use the Precor assist machine. Goal: reduce assistance each week as you get stronger. Track assist weight — lower = stronger.",
      cues:["Overhand grip slightly wider than shoulders","Dead hang start — full arm extension","Depress shoulder blades first, then pull","Drive elbows down toward hips","Chin clears the bar"],
      err:["Shrugging at bottom","Partial range — must hit full dead hang","Swinging or kipping"],
      vid:"assisted pullup form lat engagement"},
    {id:"cable_row",name:"Seated Cable Row",sets:3,rep:[10,12],type:"cable",sf:null,
      assist:null,
      cues:["Neutral spine — slight forward lean at stretch","Drive elbows back past your sides","Squeeze shoulder blades at lockout","Full stretch forward — let shoulder blade protract"],
      err:["Rounding lower back","Using momentum to heave weight","Short range of motion"],

// ── HELPERS ────────────────────────────────────────────────────────────────
const getStage=w=>w<=2?1:w<=6?2:w<=10?3:4;
const nextDay=()=>S.lastDay===null?"Day 1":DAYS[(DAYS.indexOf(S.lastDay)+1)%4];

function getPrev(exId){
  const all=Object.values(S.logs);
  for(let i=all.length-1;i>=0;i--) if(all[i].sets?.[exId]) return all[i].sets[exId];
  return null;
}
function initSets(ex){
  const prev=getPrev(ex.id);
  return Array.from({length:ex.sets},(_,i)=>({w:prev?.[i]?.w??'',r:prev?.[i]?.r??'',rir:null,form:null,pain:false}));
}
function ensureSess(day){
  if(!S.sess[day]){S.sess[day]={};P[day].ex.forEach(ex=>{S.sess[day][ex.id]=initSets(ex);});}
  if(!S.cardioLogs) S.cardioLogs=[];
  if(!S.cardioOpen) S.cardioOpen={};
}
function exDone(day,id){
  const s=S.sess[day]?.[id]; if(!s) return false;
  const ex=P[day].ex.find(e=>e.id===id);
  return s.filter(x=>x.r!=='').length>=ex.sets;
}
function exPain(day,id){return S.sess[day]?.[id]?.some(s=>s.pain);}
function countDone(day){return P[day].ex.filter(ex=>exDone(day,ex.id)).length;}

function progRec(ex,sets){
  if(!sets||sets.length<ex.sets) return null;
  const done=sets.filter(s=>s.r!=='');
  if(done.length<ex.sets) return null;
  if(!done.every(s=>s.form!==false)) return null;
  if(!done.every(s=>parseInt(s.r)>=ex.rep[1])) return null;
  if(ex.type==='assist-machine') return `Reduce assistance by 5 lb next session`;
  if(ex.type==='smith'||ex.type==='barbell') return `Add 5 lb next session`;
  if(ex.type==='dumbbell') return `Move to next dumbbell pair (+5 lb)`;
  if(ex.type==='machine') return `Add one plate/increment next session`;
  return `Add 1–2 reps next session, then bump weight`;
}

function wkStart(){const n=new Date(),d=n.getDay(),diff=d===0?-6:1-d,m=new Date(n);m.setDate(n.getDate()+diff);m.setHours(0,0,0,0);return m.getTime();}
function cardioWk(){return(S.cardioLogs||[]).filter(c=>new Date(c.date).getTime()>=wkStart());}
const milesSum=arr=>arr.reduce((s,c)=>s+(parseFloat(c.miles)||0),0);
const minsSum=arr=>arr.reduce((s,c)=>s+(parseInt(c.minutes)||0),0);

let CF={};

  const ndDone=!!S.logs[`W${w}-${nd}`];
  const KL=[
    {id:'smith_bench',n:'Smith Bench'},{id:'smith_ohp',n:'Smith OHP'},

  return `
    <div class="stage-banner">
      <div class="stage-dot" style="background:${sc.c}"></div>
      <div style="flex:1"><div style="font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3)">Phase ${st}</div><div style="font-size:13px;font-weight:500;color:var(--text)">${sc.l}</div><div style="font-size:11px;color:var(--text3);margin-top:1px">${sc.d}</div></div>
      <div class="stage-week">Wk ${w}</div>
    </div>
    ${ndDone
      ?`<div class="ndh-rest"><div style="font-size:28px;margin-bottom:6px">✅</div><div style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--text)">All caught up!</div><div style="font-size:12px;color:var(--text3);margin-top:3px">${sessW}/4 sessions done. Rest day or pick any session below.</div></div>`
      :`<div class="next-day-hero" data-startday="${nd}"><div class="ndh-eyebrow">Up Next</div><div class="ndh-title">${nd} — ${P[nd].label}</div><div class="ndh-sub">${P[nd].sub} · ${P[nd].ex.length} exercises · Week ${w}</div><div class="ndh-btn">Start Workout →</div></div>`}
    <div class="dash-grid">
      <div class="dash-card"><div class="dash-label">Week</div><div class="dash-value accent">${w}</div><div class="dash-sub">of program</div></div>
      <div class="dash-card"><div class="dash-label">Sessions</div><div class="dash-value">${sessW}<span style="font-size:14px;color:var(--text3)">/4</span></div><div class="dash-sub">this week</div></div>
      <div class="dash-card"><div class="dash-label">Miles This Week</div><div class="dash-value" style="color:var(--blue)">${milesSum(wCard).toFixed(1)}</div><div class="dash-sub">${minsSum(wCard)} min</div></div>
      <div class="dash-card"><div class="dash-label">Total Miles</div><div class="dash-value" style="color:var(--blue)">${milesSum(allCard).toFixed(1)}</div><div class="dash-sub">all time</div></div>
    </div>
    <div class="section-title">Personal Records</div>
    ${KL.map(l=>`<div class="pr-row"><div style="flex:1;font-size:12px;font-weight:600;color:var(--text)">${l.n}</div><div class="pr-val${prMap[l.id]?'':' empty'}">${prMap[l.id]?`${prMap[l.id].wt} lb × ${prMap[l.id].r}`:'—'}</div></div>`).join('')}
    <div class="section-title">All Sessions</div>
    <div class="day-list">${DAYS.map(d=>{

function workout(day){
  ensureSess(day);
  const prog=P[day],total=prog.ex.length,done=countDone(day),w=S.week,st=getStage(w);
  const ck=`${day}-c`,cardOpen=S.cardioOpen?.[ck];
  const cardLogged=(S.cardioLogs||[]).filter(c=>c.sDay===day&&c.sWeek===w);
  return `
    <div class="workout-header">
      <button class="back-btn" data-back="1">← All Days</button>
      <div class="workout-title">${day} — ${prog.label}</div>
      <div class="workout-subtitle">${prog.sub} · Week ${w} · ${STAGES[st].l} Phase</div>
    </div>
    <div class="workout-progress"><div class="workout-progress-fill" style="width:${(done/total)*100}%"></div></div>
    <div class="prog-label">${done}/${total} exercises logged</div>
    ${prog.ex.map((ex,i)=>exCard(day,ex,i)).join('')}
    <div class="cardio-card">
      <div class="cardio-header" data-ctog="${ck}">
        <div style="font-size:18px;pointer-events:none">🏃</div>
        <div style="flex:1;pointer-events:none"><div class="cardio-label">Optional Cardio</div><div class="cardio-desc">${prog.cardio}</div></div>
        ${cardLogged.length?`<div class="cardio-logged-badge" style="pointer-events:none">✓ ${cardLogged.length}</div>`:''}
        <div class="chevron${cardOpen?' open':''}" style="pointer-events:none">▼</div>
      </div>
      ${cardOpen?cardioBody(day,w):''}
    </div>
    <div class="notes-section">
      <div class="notes-title">Session Notes</div>
      ${NOTES.map(n=>`<div class="note-field"><label class="note-label">${n.l}</label><textarea class="note-input" rows="1" placeholder="${n.p}" data-nk="${n.k}" data-nd="${day}">${S.notes[day]?.[n.k]||''}</textarea></div>`).join('')}
    </div>
    <div class="complete-section"><button class="complete-btn" data-complete="${day}">Complete ${day}</button></div>
    <div style="height:20px"></div>`;
}

function exCard(day,ex,idx){
  const key=`${day}|${ex.id}`,open=S.open[key],done=exDone(day,ex.id),pain=exPain(day,ex.id);
  const sets=S.sess[day]?.[ex.id]||[];
  const rec=done?progRec(ex,sets):null;
  return `<div class="ex-card">
    <div class="ex-header" data-tog="${key}">
      <div class="ex-num">${idx+1}</div>
      <div class="ex-title">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-meta">${ex.isCore?'3 × rotate':`${ex.sets} × ${ex.rep[0]}${ex.rep[0]!==ex.rep[1]?'–'+ex.rep[1]:''}`} · ${ex.type}</div>
      </div>
      <div class="ex-status">
        ${pain?'<span style="font-size:12px;color:var(--danger)">⚡</span>':''}
        ${done?'<span class="badge-done">✓</span>':''}
        ${rec?'<span class="badge-prog">↑</span>':''}
      </div>
      <div class="chevron${open?' open':''}">▼</div>
    </div>
    ${open?exBody(day,ex,sets,rec,pain):''}
  </div>`;
}

function exBody(day,ex,sets,rec,pain){
  return `<div class="ex-body">
    ${ex.sf?`<div class="safety-warn">${SAFETY[ex.sf]}</div>`:''}
    ${ex.assist?`<div class="assist-note">ℹ ${ex.assist}</div>`:''}
    ${pain?`<div class="pain-warn">🚨 Pain flagged — drop weight 20%, reduce ROM, or swap exercise.</div>`:''}
    ${rec?`<div class="prog-rec">↑ ${rec}</div>`:''}
    ${ex.isCore?coreBlock(day,ex):setRows(day,ex,sets)}
    <div class="ex-info">
      <div class="info-section"><div class="info-label">Form Cues</div>${ex.cues.map(c=>`<div class="cue-item">${c}</div>`).join('')}</div>
      <div class="info-section"><div class="info-label">Common Mistakes</div>${ex.err.map(m=>`<div class="mistake-item">${m}</div>`).join('')}</div>
      <div class="info-section"><div class="info-label">Video</div><a class="video-link" href="https://www.youtube.com/results?search_query=${encodeURIComponent(ex.vid)}" target="_blank">▶ Search: ${ex.vid}</a></div>
    </div>
  </div>`;
}

function setRows(day,ex,sets){
  const allGood=sets.length>0&&sets.every(s=>s.form===true);
  const anyBad=sets.some(s=>s.form===false);
  const wLabel=ex.type==='assist-machine'?'Assist lb':'Weight';
  return `
    <div class="set-header">
      <div class="shc">Set</div>
      <div class="shc">${wLabel}</div>
      <div class="shc">Reps</div>
      <div class="shc">RIR</div>
      <div class="shc"></div>
    </div>
    ${sets.map((s,i)=>`
      <div class="set-row${s.r!==''?' s-done':''}${s.pain?' s-pain':''}" id="sr-${day}-${ex.id}-${i}">
        <div class="set-num">${i+1}</div>
        <input class="set-input" type="number" inputmode="decimal" placeholder="${ex.type==='assist-machine'?'lbs':'lbs'}" value="${s.w}" data-sw="${day}|${ex.id}|${i}|w">
        <input class="set-input" type="number" inputmode="numeric" placeholder="reps" value="${s.r}" data-sw="${day}|${ex.id}|${i}|r">
        <div class="rir-wrap">
          ${[2,1,0].map(rv=>`<button class="rir-btn${s.rir===rv?' sel':''}" data-rir="${day}|${ex.id}|${i}|${rv}">${rv}</button>`).join('')}
        </div>
        <button class="pain-btn${s.pain?' on':''}" data-pain="${day}|${ex.id}|${i}">⚡</button>
      </div>`).join('')}
    <div class="ex-actions">
      <button class="form-toggle${allGood?' good':anyBad?' bad':''}" data-form="${day}|${ex.id}">
        ${allGood?'✓ Form Good':anyBad?'✕ Form Issues':'Mark Form Good'}
      </button>
    </div>`;
}

function coreBlock(day,ex){
  return `<div class="core-options">
    ${Object.entries(CORES).map(([cat,moves])=>`
      <div class="core-cat-label">${cat}</div>
      <div class="core-chips">${moves.map(m=>{const k=`${day}-${ex.id}-${m}`;return`<button class="core-chip${S.cores[k]?' sel':''}" data-core="${k}">${m}</button>`;}).join('')}</div>
    `).join('')}
  </div>`;
}

function cardioBody(day,w){
  const logged=(S.cardioLogs||[]).filter(c=>c.sDay===day&&c.sWeek===w);
  return `<div class="cardio-body">
    <div class="cardio-types">${CTYPES.map(t=>`<button class="ctype-btn${CF.type===t?' sel':''}" data-ctype="${t}">${t}</button>`).join('')}</div>
    <div class="cardio-fields">
      <div class="cardio-field"><label>Minutes</label><input class="cardio-input" id="cMins" type="number" inputmode="numeric" placeholder="30" value="${CF.mins||''}"></div>
      <div class="cardio-field"><label>Miles</label><input class="cardio-input" id="cMiles" type="number" inputmode="decimal" placeholder="1.5" value="${CF.miles||''}"></div>
      <div class="cardio-field"><label>Incline %</label><input class="cardio-input" id="cInc" type="number" inputmode="numeric" placeholder="10" value="${CF.inc||''}"></div>
    </div>
    <button class="cardio-log-btn" data-clog="${day}|${w}">+ Log Cardio Session</button>
    ${logged.map((c,gi)=>`
      <div class="cardio-entry">
        <span style="color:var(--blue)">🏃</span>
        <span>${c.type||'Cardio'}</span>
        ${c.minutes?`<span>${c.minutes} min</span>`:''}
        ${c.miles?`<span>${c.miles} mi</span>`:''}
        ${c.inc?`<span>${c.inc}% incline</span>`:''}
        <button class="del-btn" data-delc="${S.cardioLogs.indexOf(c)}">✕</button>
      </div>`).join('')}
  </div>`;
}

function history(){
  const logs=Object.entries(S.logs).reverse();
  if(!logs.length) return `<div class="empty-state"><div class="empty-icon">📋</div>No sessions logged yet.<br><br>Complete your first workout to see history here.</div>`;
  return `<div class="section-title">Session History</div><div class="history-list">
    ${logs.map(([k,sess])=>{
      const d=new Date(sess.completedAt),ds=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      const sc=(S.cardioLogs||[]).filter(c=>c.sDay===sess.day&&c.sWeek===sess.week);
      return `<div class="history-card">
        <div class="hdate">${ds} · Week ${sess.week}</div>
        <div class="hname">${sess.day} — ${P[sess.day]?.label||''}</div>
        ${sess.notes?.best?`<div style="margin-top:5px;font-size:12px;color:var(--text3)">Best: ${sess.notes.best}</div>`:''}
        <div class="chip-row">
          ${(sess.topLifts||[]).slice(0,4).map(l=>`<span class="chip">${l.name.split(' ').slice(-2).join(' ')}: ${l.weight}lb</span>`).join('')}
          ${sc.map(c=>`<span class="chip blue">🏃 ${c.type} ${c.miles?c.miles+'mi':''} ${c.minutes?c.minutes+'min':''}</span>`).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function progress(){
  const all=S.cardioLogs||[],wk=cardioWk();
  const byWk={};all.forEach(c=>{const w=c.sWeek||1;byWk[w]=(byWk[w]||0)+(parseFloat(c.miles)||0);});
  const wks=Object.keys(byWk).sort((a,b)=>a-b),maxM=Math.max(...Object.values(byWk),1);
  const KL=[{id:'smith_bench',n:'Smith Bench'},{id:'smith_ohp',n:'Smith OHP'},{id:'leg_press',n:'Leg Press'},{id:'pullup_assist_a',n:'Pullup Assist'}];
  return `
    <div class="section-title">Cardio Stats</div>
    <div class="cstat-row">
      <div class="cstat"><div class="cstat-label">This Week</div><div class="cstat-val">${milesSum(wk).toFixed(1)}</div><div class="cstat-sub">mi · ${minsSum(wk)} min</div></div>
      <div class="cstat"><div class="cstat-label">All Time</div><div class="cstat-val">${milesSum(all).toFixed(1)}</div><div class="cstat-sub">miles total</div></div>
      <div class="cstat"><div class="cstat-label">Sessions</div><div class="cstat-val">${all.length}</div><div class="cstat-sub">cardio logged</div></div>
    </div>
    ${wks.length?`<div class="chart-card"><div class="chart-title">Cardio Miles per Week</div><div class="chart-area">${wks.map(w=>`<div class="bar-wrap"><div class="bar blue" style="height:${(byWk[w]/maxM)*100}%"></div></div>`).join('')}</div><div class="chart-stat">${wks.map(w=>`Wk ${w}: ${byWk[w].toFixed(1)}mi`).join(' · ')}</div></div>`:''}
    <div class="section-title">Lift Progress</div>
    ${KL.map(lift=>{
      const pts=[];Object.values(S.logs).forEach(sess=>{const sets=sess.sets?.[lift.id];if(sets){const mx=Math.max(...sets.map(s=>parseFloat(s.w)||0));if(mx>0)pts.push(mx);}});
      const mx=Math.max(...pts,1);
      return `<div class="chart-card">
        <div class="chart-title">${lift.n} — Top Weight Per Session</div>
        ${pts.length?`<div class="chart-area">${pts.map(v=>`<div class="bar-wrap"><div class="bar" style="height:${(v/mx)*100}%"></div></div>`).join('')}</div><div class="chart-stat">Current: <span style="color:var(--accent);font-weight:700">${pts[pts.length-1]} lb</span>${pts.length>1?` · +${pts[pts.length-1]-pts[0]} lb since start`:''}</div>`:`<div class="chart-empty">No data yet — log a session to start tracking</div>`}
      </div>`;
    }).join('')}
    <div class="section-title">Pullup Progress</div>
    <div class="chart-card">
      <div class="chart-title">Assist Weight Over Time (lower = stronger)</div>
      ${(()=>{
        const pts=[];Object.values(S.logs).forEach(sess=>{const sets=sess.sets?.pullup_assist_a||sess.sets?.pullup_assist_b;if(sets){const mx=Math.max(...sets.map(s=>parseFloat(s.w)||0));if(mx>0)pts.push(mx);}});
        const mx=Math.max(...pts,1);
        return pts.length?`<div class="chart-area">${pts.map(v=>`<div class="bar-wrap"><div class="bar blue" style="height:${(v/mx)*100}%"></div></div>`).join('')}</div><div class="chart-stat">Current assist: <span style="color:var(--blue);font-weight:700">${pts[pts.length-1]} lb</span>${pts.length>1?` · started at ${pts[0]} lb`:''}</div>`:`<div class="chart-empty">No pullup data yet</div>`;
      })()}
    </div>`;
}

function settings(){
  return `<div class="section-title">Program Settings</div><div class="settings-section">
    <div class="setting-card">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="flex:1"><div class="setting-name">Current Week</div><div class="setting-desc">Adjusts phase and progression targets</div></div>
        <div class="num-ctrl"><button class="num-btn" data-wk="-1">−</button><div class="num-val">${S.week}</div><button class="num-btn" data-wk="+1">+</button></div>
      </div>
    </div>
    <div class="setting-card">
      <div class="setting-name" style="margin-bottom:4px">Next Session</div>
      <div style="font-size:13px;color:var(--text3)">Queued: <span style="color:var(--accent);font-weight:600">${nextDay()}</span></div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">Advances automatically when you complete a workout. You can always pick any day manually.</div>
    </div>
    <div class="setting-card">
      <div class="setting-name" style="margin-bottom:10px">Phase Guide</div>
      ${Object.entries(STAGES).map(([n,sc])=>`<div class="phase-row"><div class="phase-dot" style="background:${sc.c}"></div><div><div style="font-size:13px;font-weight:600;color:var(--text)">${sc.l} (Phase ${n})</div><div style="font-size:11px;color:var(--text3)">${sc.d}</div></div></div>`).join('')}
    </div>
    <div class="setting-card">
      <div class="setting-name" style="margin-bottom:6px">Progression Rules</div>
      <div class="prog-info">
        <b>Smith / Barbell:</b> +5 lb when all sets hit top rep with good form<br>
        <b>Dumbbell:</b> Move to next pair (+5 lb total)<br>
        <b>Machines:</b> Add one increment/plate next session<br>
        <b>Pullup Assist:</b> Reduce assist by 5 lb — lower assist = stronger<br>
        <b>Cable / Isolation:</b> Add reps first, then small weight bump
      </div>
    </div>
    <div class="setting-card">
      <div class="setting-name" style="margin-bottom:6px">Equipment at Your Gym</div>
      <div class="prog-info">
        ✓ Smith machine<br>
        ✓ Rack of dumbbells<br>
        ✓ Precor cable station<br>
        ✓ Precor machines (leg press, leg curl, leg ext, calf)<br>
        ✓ Precor pull-up assist machine<br>
        ✗ No squat rack · No deadlift platform · No barbell bench
      </div>
    </div>
  </div>`;
}

// ── EVENT BINDING ──────────────────────────────────────────────────────────
function bind(){
  const app=document.getElementById('app');

  function delegate(e){
    const t=e.target;
    // Let inputs and textareas handle their own events
    if(t.tagName==='INPUT'||t.tagName==='TEXTAREA') return;
    function up(attr){return t.closest('['+attr+']');}

    const tab=up('data-tab');
    if(tab){S.tab=tab.dataset.tab;if(S.tab!=='workout')S.activeDay=null;save();render();return;}

    const start=up('data-startday');
    if(start){S.activeDay=start.dataset.startday;ensureSess(S.activeDay);save();render();return;}

    const back=up('data-back');
    if(back){S.activeDay=null;save();render();return;}

    const tog=up('data-tog');
    if(tog){const k=tog.dataset.tog;S.open[k]=!S.open[k];save();render();return;}

    const ctog=up('data-ctog');
    if(ctog){const k=ctog.dataset.ctog;if(!S.cardioOpen)S.cardioOpen={};S.cardioOpen[k]=!S.cardioOpen[k];save();render();return;}

    const rir=up('data-rir');
    if(rir){const[day,id,i,rv]=rir.dataset.rir.split('|');const s=S.sess[day][id][+i];s.rir=s.rir===+rv?null:+rv;save();render();return;}

    const pain=up('data-pain');
    if(pain){const[day,id,i]=pain.dataset.pain.split('|');S.sess[day][id][+i].pain=!S.sess[day][id][+i].pain;save();render();return;}

    const form=up('data-form');
    if(form){const[day,id]=form.dataset.form.split('|');const sets=S.sess[day][id];const all=sets.every(s=>s.form===true);sets.forEach(s=>s.form=!all);save();render();return;}

    const core=up('data-core');
    if(core){const k=core.dataset.core;S.cores[k]=!S.cores[k];save();render();return;}

    const ctype=up('data-ctype');
    if(ctype){CF.type=ctype.dataset.ctype;render();return;}

    const clog=up('data-clog');
    if(clog){
      const[day,w]=clog.dataset.clog.split('|');
      const mins=document.getElementById('cMins')?.value||CF.mins||'';
      const miles=document.getElementById('cMiles')?.value||CF.miles||'';
      const inc=document.getElementById('cInc')?.value||CF.inc||'';
      if(!S.cardioLogs)S.cardioLogs=[];
      S.cardioLogs.push({date:new Date().toISOString(),sDay:day,sWeek:+w,type:CF.type||'Cardio',minutes:mins,miles,inc});
      CF={};save();render();return;
    }

    const delc=up('data-delc');
    if(delc){S.cardioLogs.splice(+delc.dataset.delc,1);save();render();return;}

    const wkBtn=up('data-wk');
    if(wkBtn){S.week=Math.min(12,Math.max(1,S.week+(+wkBtn.dataset.wk)));save();render();return;}

    const complete=up('data-complete');
    if(complete){
      const day=complete.dataset.complete;
      const topLifts=[];
      P[day].ex.forEach(ex=>{const sets=S.sess[day]?.[ex.id];if(sets){const mx=Math.max(...sets.map(s=>parseFloat(s.w)||0));if(mx>0)topLifts.push({name:ex.name,weight:mx,reps:sets[0]?.r});}});
      S.logs[`W${S.week}-${day}`]={day,week:S.week,sets:JSON.parse(JSON.stringify(S.sess[day]||{})),notes:JSON.parse(JSON.stringify(S.notes[day]||{})),completedAt:new Date().toISOString(),topLifts};
      S.lastDay=day;
      complete.textContent='✓ Saved!';complete.classList.add('saved');save();
      setTimeout(()=>{S.activeDay=null;save();render();},1400);
      return;
    }
  }

  // Use click only — touchend+preventDefault breaks input focus on iOS Safari
  app.addEventListener('click',delegate);

  // Set inputs — 'input' fires on every keystroke, works on iOS
  app.querySelectorAll('[data-sw]').forEach(el=>{
    el.addEventListener('input',()=>{
      const[day,id,i,field]=el.dataset.sw.split('|');
      if(!S.sess[day]?.[id])return;
      S.sess[day][id][+i][field]=el.value;
      save();
      const row=document.getElementById(`sr-${day}-${id}-${i}`);
      if(row){const s=S.sess[day][id][+i];row.className='set-row'+(s.r!==''?' s-done':'')+(s.pain?' s-pain':'');}
    });
  });

  // Note textareas
  app.querySelectorAll('[data-nk]').forEach(el=>{
    el.addEventListener('input',()=>{
      const day=el.dataset.nd,k=el.dataset.nk;
      if(!S.notes[day])S.notes[day]={};
      S.notes[day][k]=el.value;save();
    });
  });

  // Cardio input sync
  const cMins=document.getElementById('cMins');
  const cMiles=document.getElementById('cMiles');
  const cInc=document.getElementById('cInc');
  if(cMins)cMins.addEventListener('input',()=>{CF.mins=cMins.value;});
  if(cMiles)cMiles.addEventListener('input',()=>{CF.miles=cMiles.value;});
  if(cInc)cInc.addEventListener('input',()=>{CF.inc=cInc.value;});
}

render();
</script>
</body>
